# configs/config.yaml

project:
  name: "LENS"
  version: "1.0.0"
  seed: 42

paths:
  data_raw: "data/raw"
  data_processed: "data/processed"
  images: "data/images"
  embeddings: "embeddings"
  checkpoints: "checkpoints"
  results: "results"
  logs: "logs/mlruns"

dataset:
  locale: "us"                   # use English (US) product listings
  n_train: 100000                # number of training pairs
  n_val: 10000                   # number of validation pairs
  n_test: 10000                  # number of test pairs
  label_map:                     # ESCI labels → integer indices
    Exact: 3                         # Exact      → highest relevance
    Substitute: 2                         # Substitute → second highest
    Complement: 1                         # Complementary → third
    Irrelevant: 0                         # Irrelevant → lowest
  stratify_col: "esci_label"
  image_size: 224

encoders:
  image_model: "vit_small_patch14_dinov2.lvd142m"   # DINOv2 ViT-S/14
  text_model: "sentence-transformers/all-MiniLM-L6-v2"
  embedding_dim: 384             # output dim for both encoders
  image_batch_size: 64           # batch size for offline encoding
  text_batch_size: 256

faiss:
  index_type: "FlatIP"           # exact search for our scale
  top_k_retrieve: 50             # candidates from FAISS before reranking

training:
  batch_size: 256
  learning_rate: 1e-4
  weight_decay: 1e-2
  epochs: 20
  warmup_steps: 500
  grad_clip: 1.0
  val_every_n_steps: 500

model:
  embedding_dim: 384
  fusion_heads: 8                # number of cross-attention heads
  fusion_layers: 2               # number of cross-attention layers
  dropout: 0.1

mlflow:
  experiment_name: "LENS-FusionBridge"
  run_tags:
    project: "LENS"
    phase: "training"

wandb:
  project: "LENS"
  entity: null                   # your wandb username, fill in later